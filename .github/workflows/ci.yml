name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, pdo_sqlite
          coverage: none
      - run: php tools/package-audit.php
      - run: composer install --no-interaction --prefer-dist
      - run: composer check-platform-reqs
      - run: php tools/bootstrap-preflight.php
      - run: php tools/runtime-baseline-check.php
      - run: php tools/client-timing-check.php
      - run: php tools/domain-tests.php
      - run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
      - run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
      - run: php bin/console app:installation:verify --env=test
      - run: php bin/phpunit
      - run: php bin/console app:verification:catalog-round --env=test
      - run: php bin/console app:verification:cryptographic-commitment --env=test
      - run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
      - run: php bin/console app:verification:play-start-accounting --env=test
      - run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
      - run: php bin/console app:verification:step-timer-anti-replay --env=test
