doctrine:
    dbal:
        driver: pdo_sqlite
        path: '%kernel.project_dir%/var/data.db'
    orm:
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src'
                prefix: 'App'
                alias: App

when@test:
    doctrine:
        dbal:
            path: '%kernel.project_dir%/var/test.db'
